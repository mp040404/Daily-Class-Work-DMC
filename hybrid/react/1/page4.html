<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    
    <div id="root"></div>

    <script>
        const root = ReactDOM.createRoot(document.getElementById('root'))

        const h1 = React.createElement('h1',{},'React Application')
        const h2 = React.createElement('h2',{},'The library for web and native user interfaces')
        const hr = React.createElement('hr',{})
        const div = React.createElement('div',{},'React lets you build user interfaces out of individual pieces called components. Create your own React components like Thumbnail, LikeButton, and Video. Then combine them into entire screens, pages, and apps.')

        const container = React.createElement('div',{},[h1,h2,hr,div])

        root.render(container)
    </script>
</body>
</html>
