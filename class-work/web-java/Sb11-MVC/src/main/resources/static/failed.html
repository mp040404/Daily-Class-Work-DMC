<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Failed</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center" style="width: 400px;">
        <h2 class="text-center mb-4">📚 Online Book Shop</h2>
        
        <!-- Error Icon -->
        <div class="mb-3">
            <h1 class="text-danger">❌</h1>
        </div>

        <!-- Message -->
        <h3 class="text-danger">Login Failed</h3>
        <p class="text-muted">Invalid email or password. Please try again.</p>

        <!-- Buttons -->
        <div class="d-grid gap-2 mt-3">
            <a href="index.html" class="btn btn-primary">Try Again</a>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
