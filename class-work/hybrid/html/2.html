<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <table >
        <form action="#">
            <tr>
                <td colspan="3"><center><img width="300px" src="https://www.sunbeaminfo.com/img/new/sunbeamnewactslogo.png" alt="sunbeam logo"></center></td>
            </tr>
            <tr>
                <td colspan="3"><center>Sunbeam Registration Form</center></td>
            </tr>
            <tr>
                <td rowspan="10">
                    <iframe width="350" height="200" src="https://www.youtube.com/embed/Az5Bt3zUtiM?si=0-HKF9Uk6EkNjkTJ&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </td>
                <td>Name:</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>BirthDate:</td>
                <td><input type="date" name="birth_date"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" name="email_id" id=""></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="pass" id=""></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><textarea cols="5" name="text_area" id=""></textarea></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                </td>
            </tr>
            <tr>
                <td>Upload Photo:</td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td>Select your Course:</td>
                <td><select t name="drop" id="">
                        <option value="Select Course">Select Course</option>
                        <option value="PGCP-AC">PGCP-AC</option>
                        <option value="PGCP-BDA">PGCP-BDA</option>
                        <option value="PGCP-DITIS">PGCP-DITIS</option>
                    </select></td>
            </tr>
            <tr>
                <td>Skill Set:</td>
                <td>
                    <input type="checkbox" name="check" value="Java">Java
                    <input type="checkbox" name="check" value="CPP">CPP
                    <input type="checkbox" name="check" value="OS">OS
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">
                </td>
            </tr>
        </form>
    </table>
</body>

</html>
